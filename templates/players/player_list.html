{% extends "base.html" %} 
{% load static %}

{% block content %}
<h1 class="text-center my-4">Players</h1>

<div class="container mb-4">
    <form method="GET" id="filter-form" class="row g-2 justify-content-center">
        <div class="col-auto">
            <select name="country" class="form-select border-0 shadow-sm" style="border-radius: 10px;">
                <option value="All">Всі країни</option>
                {% for country in countries %}
                    <option value="{{ country }}" {% if country == selected_country %}selected{% endif %}>
                        {{ country }}
                    </option>
                {% endfor %}
            </select>
        </div>
        <div class="col-auto">
            <button type="submit" class="btn btn-danger px-4 shadow-sm" style="border-radius: 10px;">
                Показать
            </button>
        </div>
    </form>
</div>

<div id="player-container" class="row g-3 row-cols-1 row-cols-sm-2 row-cols-md-4 row-cols-lg-5 justify-content-center"> 
    {% include "players/_player_list.html" %}
</div>

<script>
document.getElementById('filter-form').addEventListener('submit', function(e) {
    e.preventDefault(); // Зупиняє звичайне перезавантаження сторінки

    let form = this;
    let url = form.action || window.location.href;
    let formData = new URLSearchParams(new FormData(form)).toString();

    // Відправляє AJAX запит
    fetch(`${url}?${formData}`, {
        headers: {
            'X-Requested-With': 'XMLHttpRequest'
        }
    })
    .then(response => response.json())
    .then(data => {
        document.getElementById('player-container').innerHTML = data.html;
    })
    .catch(error => console.error('Error:', error));
});
</script>
{% endblock content %}
