{% extends "base.html" %}

{% block content %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card shadow border-0 p-4" style="background: var(--filter-bg); color: var(--filter-text);">
                <h2 class="mb-4 text-center">Додати нового гравця</h2>
                
                <form method="POST" enctype="multipart/form-data">
                    {% csrf_token %}
                    
                    {% for field in form %}
                        <div class="mb-3">
                            <label class="form-label">{{ field.label }}</label>
                            {{ field }}
                            {% if field.errors %}
                                <div class="text-danger small">{{ field.errors }}</div>
                            {% endif %}
                        </div>
                    {% endfor %}
                    
                    <div class="d-grid gap-2">
                        <button type="submit" class="btn btn-danger btn-lg">Створити гравця</button>
                        <a href="{% url 'dashboard_home' %}" class="btn btn-outline-secondary">Назад в меню</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
