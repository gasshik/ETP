{% load static %}
<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ETP Project</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="{% static 'css/style.css' %}" />

    <script>
      // Миттєве оновлення теми
      (function() {
        const theme = localStorage.getItem('theme') || 'light';
        if (theme === 'dark') {
          document.documentElement.classList.add('dark-theme');
        } else {
          document.documentElement.classList.remove('dark-theme');
        }
      })();
    </script>
  </head>
  <body>
    {% include "header.html" %}

    <div class="theme-controls container mt-2 text-end" style="position: relative; z-index: 9999;">
      <button type="button" id="theme-switcher" class="theme-btn">
        <span class="icon">🌙</span>
      </button>
    </div>

    <div class="container mt-4">
      {% block content %}{% endblock %}
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    
    <script>
  document.addEventListener('DOMContentLoaded', function() {
    const html = document.documentElement;
    const themeBtn = document.getElementById('theme-switcher');
    
    function syncTheme() {
      const savedTheme = localStorage.getItem('theme') || 'light';
      const iconSpan = themeBtn ? themeBtn.querySelector('.icon') : null;

      if (savedTheme === 'dark') {
        html.classList.add('dark-theme');
        if (iconSpan) iconSpan.textContent = '☀️';
      } else {
        html.classList.remove('dark-theme');
        if (iconSpan) iconSpan.textContent = '🌙';
      }
    }

    syncTheme();

    window.addEventListener('pageshow', function(event) {
      syncTheme();
    });

    //Клік
    if (themeBtn) {
      themeBtn.addEventListener('click', function() {
        html.classList.toggle('dark-theme');
        const isDark = html.classList.contains('dark-theme');
        localStorage.setItem('theme', isDark ? 'dark' : 'light');
        syncTheme(); // Оновлення кнопки
      });
    }
  });
</script>
  </body>
</html>
